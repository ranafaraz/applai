name: Check App Logs

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Get recent error logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            grep "Gpt\|gpt\|opportunities\|AiAction\|OpportunityController\|timeline_events\|TimelineEvent" /var/www/crm.dexdevs.com/storage/logs/laravel.log | tail -50
