name: Debug Upload Endpoints

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Run upload diagnostics via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/crm.dexdevs.com

            echo "=== Tenant data diagnostics ==="
            {
              printf '%s\n' '<?php'
              printf '%s\n' 'chdir("/var/www/crm.dexdevs.com");'
              printf '%s\n' 'require "vendor/autoload.php";'
              printf '%s\n' '$app = require "bootstrap/app.php";'
              printf '%s\n' '$app->make("Illuminate\Contracts\Console\Kernel")->bootstrap();'
              printf '%s\n' 'echo "users:\n";'
              printf '%s\n' 'foreach (\App\Models\User::all(["id","email","tenant_id","role"]) as $u) {'
              printf '%s\n' '    echo "  id={$u->id} email={$u->email} tenant_id={$u->tenant_id} role={$u->role}\n";'
              printf '%s\n' '}'
              printf '%s\n' 'echo "tenants:\n";'
              printf '%s\n' 'if (class_exists(\App\Models\Tenant::class)) {'
              printf '%s\n' '    foreach (\App\Models\Tenant::all() as $t) { echo "  id={$t->id} name={$t->name}\n"; }'
              printf '%s\n' '} else { echo "  (no Tenant model)\n"; }'
              printf '%s\n' 'echo "opportunities by tenant_id:\n";'
              printf '%s\n' 'foreach (\App\Models\Opportunity::selectRaw("tenant_id, count(*) c")->groupBy("tenant_id")->get() as $r) {'
              printf '%s\n' '    echo "  tenant_id={$r->tenant_id} count={$r->c}\n";'
              printf '%s\n' '}'
              printf '%s\n' 'echo "contacts by tenant_id:\n";'
              printf '%s\n' 'foreach (\App\Models\Contact::selectRaw("tenant_id, count(*) c")->groupBy("tenant_id")->get() as $r) {'
              printf '%s\n' '    echo "  tenant_id={$r->tenant_id} count={$r->c}\n";'
              printf '%s\n' '}'
              printf '%s\n' '$apiClients = \App\Models\ApiClient::all(["id","user_id","name","is_active"]);'
              printf '%s\n' 'echo "api_clients:\n";'
              printf '%s\n' 'foreach ($apiClients as $c) { echo "  id={$c->id} user_id={$c->user_id} name={$c->name} active={$c->is_active}\n"; }'
            } > /tmp/diag3.php
            php /tmp/diag3.php
            rm -f /tmp/diag3.php

            echo "Done."
