name: Debug Upload Endpoints

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Run upload diagnostics via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/crm.dexdevs.com

            echo "=== Create temp API client with full scopes ==="
            {
              printf '%s\n' '<?php'
              printf '%s\n' 'chdir("/var/www/crm.dexdevs.com");'
              printf '%s\n' 'require "vendor/autoload.php";'
              printf '%s\n' '$app = require "bootstrap/app.php";'
              printf '%s\n' '$app->make("Illuminate\Contracts\Console\Kernel")->bootstrap();'
              printf '%s\n' '$user = \App\Models\User::where("email","ranafarazahmed@gmail.com")->first();'
              printf '%s\n' '$client = \App\Models\ApiClient::create(["user_id"=>$user->id,"name"=>"DEBUG-TEMP","source_type"=>"custom_gpt","scopes"=>["documents:read","documents:write","attachments:read","attachments:write","drafts:read","drafts:create","followups:read","followups:create","opportunities:read","contacts:read"],"is_active"=>true]);'
              printf '%s\n' '["raw"=>$raw,"hash"=>$hash,"prefix"=>$prefix] = \App\Models\ApiClientToken::generateRaw();'
              printf '%s\n' '\App\Models\ApiClientToken::create(["api_client_id"=>$client->id,"user_id"=>$user->id,"name"=>"debug","token_hash"=>$hash,"token_prefix"=>$prefix,"is_active"=>true]);'
              printf '%s\n' 'echo "CLIENT_ID=".$client->id."\n";'
              printf '%s\n' 'echo "RAW_TOKEN=".$raw."\n";'
            } > /tmp/mk_token.php
            php /tmp/mk_token.php > /tmp/token_out.txt
            cat /tmp/token_out.txt
            TOKEN=$(grep RAW_TOKEN /tmp/token_out.txt | cut -d= -f2)
            CLIENT_ID=$(grep CLIENT_ID /tmp/token_out.txt | cut -d= -f2)
            rm -f /tmp/mk_token.php /tmp/token_out.txt

            echo "=== Upload Document B (linked to contact 209) ==="
            echo "CRM acceptance test file B - for contact 209 and follow-up 14" > /tmp/test_docB.txt
            RESP_B=$(curl -s -X POST "https://crm.dexdevs.com/api/gpt/v1/documents/upload" \
              -H "X-Api-Key: $TOKEN" \
              -H "Accept: application/json" \
              -F "file=@/tmp/test_docB.txt;type=text/plain" \
              -F "name=CRM Test Document B" \
              -F "document_type=other" \
              -F "contact_id=209")
            echo "$RESP_B"
            DOCB_ID=$(echo "$RESP_B" | php -r '$d=json_decode(file_get_contents("php://stdin"),true); echo $d["data"]["document_id"] ?? "";')
            echo "DOCB_ID=$DOCB_ID"

            echo "=== Link Document 3 (Debug Test Document) to email_draft 519 ==="
            curl -s -X POST "https://crm.dexdevs.com/api/gpt/v1/documents/3/links" \
              -H "X-Api-Key: $TOKEN" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d '{"entity_type":"email_draft","entity_id":519}'
            echo ""

            echo "=== Link Document B to follow_up 14 ==="
            curl -s -X POST "https://crm.dexdevs.com/api/gpt/v1/documents/${DOCB_ID}/links" \
              -H "X-Api-Key: $TOKEN" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d '{"entity_type":"follow_up","entity_id":14}'
            echo ""

            echo "=== Render frontend pages and check for linked documents ==="
            {
              printf '%s\n' '<?php'
              printf '%s\n' 'chdir("/var/www/crm.dexdevs.com");'
              printf '%s\n' 'require "vendor/autoload.php";'
              printf '%s\n' '$app = require "bootstrap/app.php";'
              printf '%s\n' '$kernel = $app->make(Illuminate\Contracts\Http\Kernel::class);'
              printf '%s\n' '$kernel->bootstrap();'
              printf '%s\n' '$user = \App\Models\User::where("email","ranafarazahmed@gmail.com")->first();'
              printf '%s\n' '$app->instance("request", \Illuminate\Http\Request::create("/", "GET"));'
              printf '%s\n' '\Illuminate\Support\Facades\Auth::guard("web")->setUser($user);'
              printf '%s\n' '$checks = ['
              printf '%s\n' '  ["/opportunities/285", "Debug Test Document"],'
              printf '%s\n' '  ["/contacts/209", "CRM Test Document B"],'
              printf '%s\n' '  ["/emails/519", "Debug Test Document"],'
              printf '%s\n' '  ["/follow-ups/14", "CRM Test Document B"],'
              printf '%s\n' '];'
              printf '%s\n' 'foreach ($checks as [$path, $needle]) {'
              printf '%s\n' '    $request = \Illuminate\Http\Request::create($path, "GET");'
              printf '%s\n' '    $response = $kernel->handle($request);'
              printf '%s\n' '    $status = $response->getStatusCode();'
              printf '%s\n' '    $content = $response->getContent();'
              printf '%s\n' '    $found = str_contains($content, $needle) ? "FOUND" : "MISSING";'
              printf '%s\n' '    echo "$path => HTTP $status, '"'"'$needle'"'"' => $found\n";'
              printf '%s\n' '    $kernel->terminate($request, $response);'
              printf '%s\n' '}'
            } > /tmp/render_check.php
            php /tmp/render_check.php
            rm -f /tmp/render_check.php

            echo "=== Recent laravel.log (last 40 lines) ==="
            tail -40 storage/logs/laravel.log || true

            echo "=== Cleanup temp client ==="
            {
              printf '%s\n' '<?php'
              printf '%s\n' 'chdir("/var/www/crm.dexdevs.com");'
              printf '%s\n' 'require "vendor/autoload.php";'
              printf '%s\n' '$app = require "bootstrap/app.php";'
              printf '%s\n' '$app->make("Illuminate\Contracts\Console\Kernel")->bootstrap();'
              printf '%s\n' '\App\Models\ApiClientToken::where("api_client_id",'"$CLIENT_ID"')->delete();'
              printf '%s\n' '\App\Models\ApiClient::where("id",'"$CLIENT_ID"')->delete();'
              printf '%s\n' 'echo "cleaned up client '"$CLIENT_ID"'\n";'
            } > /tmp/cleanup.php
            php /tmp/cleanup.php
            rm -f /tmp/cleanup.php /tmp/test_docB.txt

            echo "Done."
